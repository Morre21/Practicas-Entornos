<!doctype html>
<html lang="en">
  <head>

    <link rel="stylesheet" type="text/css" href="est.css">

    <div class="container-fluid">
      <div class="row">
        <div class="col-12 violeta"></div>
      </div>
      <div class="row">
        <div class="col-12 col-sm-3 sidebar"></div>
        <div class="col-12 col-sm-9 p-0">

            <div class="col-12 verde"></div>
          </div>

            <div class="col-6 gris border border-white"></div>
          </div>

            <div class="col-6 col-sm-4 celeste border border-white"></div>
